name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,data]"

      # Advisory for now: the tree has a pre-existing lint backlog. This surfaces
      # ruff suggestions on each PR without failing the build. Once the backlog is
      # cleared (`ruff check --fix .`), remove `continue-on-error` to make it a gate.
      - name: Lint (ruff, advisory)
        continue-on-error: true
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q
